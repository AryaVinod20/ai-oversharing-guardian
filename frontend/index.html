<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Oversharing Guardian</title>
  <style>
    body {
      background: #0a0e17;
      color: white;
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 50px auto;
      padding: 20px;
    }
    h1 { color: #00e5ff; }
    textarea {
      width: 100%;
      height: 120px;
      background: #1a2235;
      color: white;
      border: 1px solid #00e5ff;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      margin-top: 10px;
    }
    button {
      margin-top: 12px;
      background: #00e5ff;
      color: #0a0e17;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
    #result { margin-top: 30px; }
    .score-box {
      background: #1a2235;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .HIGH { border-left: 5px solid #ef4444; }
    .MEDIUM { border-left: 5px solid #f59e0b; }
    .LOW { border-left: 5px solid #10b981; }
    .finding {
      background: #111827;
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
    }
    .safer {
      background: #052e16;
      border-left: 5px solid #10b981;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <h1>🛡️ AI Oversharing Guardian</h1>
  <p>Type a social media post below and we'll check it for privacy risks.</p>

  <textarea id="postInput" 
    placeholder="e.g. Going on vacation from 10th to 15th, house will be empty!">
  </textarea>

  <br>
  <button onclick="analyzePost()">🔍 Analyze Post</button>

  <div id="result"></div>

<script>
  async function analyzePost() {

    // 1. Get the text from the textarea
    const postText = document.getElementById('postInput').value;

    // 2. Show loading message
    document.getElementById('result').innerHTML = '<p>Analyzing... please wait ⏳</p>';

    try {
      // 3. Send POST request to our backend
      const response = await fetch('http://localhost:3000/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ postText })
      });

      // 4. Get the JSON response
      const json = await response.json();
      const data = json.data;

      // 5. Build the result HTML
      let findingsHTML = '';
      data.findings.forEach(f => {
        findingsHTML += `
          <div class="finding">
            <strong>${f.category}</strong><br>
            ${f.issue}
          </div>`;
      });

      // 6. Display everything
      document.getElementById('result').innerHTML = `
        <div class="score-box ${data.risk_level}">
          <h2>Risk Score: ${data.risk_score}/10 — ${data.risk_level} 🚨</h2>
        </div>
        <h3>⚠️ Issues Found:</h3>
        ${findingsHTML}
        <div class="safer">
          <h3>✅ Safer Version:</h3>
          <p>${data.safer_version}</p>
        </div>
      `;

    } catch (error) {
      document.getElementById('result').innerHTML = 
        '<p style="color:red">Error connecting to server. Is the backend running?</p>';
    }
  }
</script>

</body>
</html>
